<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root{
    --bg:#0d1117; --bg-2:#11161d; --panel:#161b22; --panel-2:#1c232c;
    --border:#283039; --text:#e6edf3; --muted:#9aa7b4; --faint:#6b7785;
    --accent:#4493f8; --accent-2:#7ee787; --warn:#e3b341; --danger:#f85149;
    --radius:10px; --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  /* Layout */
  .layout{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
  .sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--bg-2);border-right:1px solid var(--border);padding:20px 16px;display:flex;flex-direction:column;gap:16px}
  .main{min-width:0;padding:40px 48px 120px;max-width:1100px}
  @media(max-width:860px){
    .layout{grid-template-columns:1fr}
    .sidebar{position:fixed;z-index:50;width:84%;max-width:320px;transform:translateX(-105%);transition:transform .2s ease;box-shadow:0 0 40px rgba(0,0,0,.5)}
    .sidebar.open{transform:none}
    .main{padding:64px 20px 100px}
    .menu-btn{display:inline-flex!important}
  }

  /* Sidebar */
  .brand{font-weight:700;font-size:16px;letter-spacing:-.01em}
  .brand small{display:block;font-weight:400;color:var(--muted);font-size:12px;margin-top:2px}
  .search{position:relative}
  .search input{width:100%;padding:9px 12px 9px 32px;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--faint)}
  nav.toc{display:flex;flex-direction:column;gap:1px;overflow-y:auto}
  nav.toc a{display:block;padding:5px 10px;border-radius:6px;color:var(--muted);font-size:13px;border-left:2px solid transparent}
  nav.toc a:hover{background:var(--panel);color:var(--text);text-decoration:none}
  nav.toc a.lvl3{padding-left:24px;font-size:12.5px}
  nav.toc a.active{color:var(--text);background:var(--panel-2);border-left-color:var(--accent)}
  nav.toc a.hidden{display:none}
  .side-foot{margin-top:auto;color:var(--faint);font-size:11.5px;line-height:1.5;border-top:1px solid var(--border);padding-top:12px}

  /* Top bar (mobile) */
  .menu-btn{display:none;position:fixed;top:14px;left:14px;z-index:60;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;width:38px;height:38px;align-items:center;justify-content:center;cursor:pointer}

  /* Headings & content */
  .doc-head{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
  .doc-head h1{margin:0 0 6px;font-size:30px;letter-spacing:-.02em}
  .doc-head .sub{color:var(--muted);font-size:15px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
  .chip{background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:3px 11px;font-size:12px;color:var(--muted)}
  .chip b{color:var(--text);font-weight:600}

  section[data-section]{margin:0 0 14px;scroll-margin-top:24px}
  section[data-section].hidden{display:none}
  h2{font-size:21px;letter-spacing:-.01em;margin:38px 0 14px;padding-top:8px}
  h3{font-size:16.5px;margin:26px 0 10px;color:var(--text)}
  h2:first-child{margin-top:0}
  p{margin:10px 0}
  .lead{color:var(--muted)}
  code{font-family:var(--mono);font-size:.88em;background:var(--panel-2);padding:1.5px 6px;border-radius:5px;border:1px solid var(--border)}
  pre{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;overflow:auto}
  pre code{background:none;border:none;padding:0}
  ul,ol{padding-left:22px}
  li{margin:3px 0}
  hr{border:none;border-top:1px solid var(--border);margin:24px 0}

  /* Tables */
  table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top}
  th{background:var(--panel);color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--panel)}
  td code{white-space:nowrap}

  /* Collapsibles */
  details{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);margin:10px 0;overflow:hidden}
  details>summary{cursor:pointer;padding:11px 14px;font-weight:600;list-style:none;display:flex;align-items:center;gap:8px;user-select:none}
  details>summary::-webkit-details-marker{display:none}
  details>summary::before{content:"▶";color:var(--faint);font-size:10px;transition:transform .15s}
  details[open]>summary::before{transform:rotate(90deg)}
  details>summary:hover{background:var(--panel-2)}
  details .body{padding:0 14px 14px}
  details .body>*:first-child{margin-top:6px}
  details .body h4{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin:16px 0 6px;font-weight:600}
  details.endpoint>summary{flex-wrap:wrap}
  details.endpoint>summary code{font-weight:600;background:none;border:none;padding:0;color:var(--text)}
  details.endpoint>summary .tag{margin-left:auto}
  details.endpoint>summary .sum-note{flex-basis:100%;padding-left:18px;font-weight:400;color:var(--muted);font-size:12.5px}

  /* Badges */
  .badge{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.02em}
  .m-get{background:rgba(68,147,248,.15);color:#79c0ff;border:1px solid rgba(68,147,248,.3)}
  .m-post{background:rgba(126,231,135,.13);color:#7ee787;border:1px solid rgba(126,231,135,.3)}
  .m-put,.m-patch{background:rgba(227,179,65,.13);color:#e3b341;border:1px solid rgba(227,179,65,.3)}
  .m-delete{background:rgba(248,81,73,.13);color:#ff7b72;border:1px solid rgba(248,81,73,.3)}
  .tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:5px;background:var(--panel-2);border:1px solid var(--border);color:var(--muted)}
  .tag.ok{color:var(--accent-2)} .tag.warn{color:var(--warn)} .tag.danger{color:var(--danger)}

  /* Mermaid */
  .mermaid{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;margin:16px 0;overflow-x:auto}
  .mermaid svg{max-width:100%;height:auto}

  /* Callouts */
  .note{border-left:3px solid var(--accent);background:var(--panel);border-radius:0 8px 8px 0;padding:10px 14px;margin:14px 0;font-size:13.5px;color:var(--muted)}
  .note.warn{border-left-color:var(--warn)}
  .empty{color:var(--faint);font-style:italic}
  mark{background:rgba(227,179,65,.35);color:#fff;border-radius:3px;padding:0 1px}
  .no-results{color:var(--faint);padding:40px 0;text-align:center;display:none}
</style>
</head>
<body>
<button class="menu-btn" aria-label="Toggle menu" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">{{REPO_NAME}}<small>Architecture Report</small></div>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Search the report…" autocomplete="off">
    </div>
    <nav class="toc" id="toc"></nav>
    <div class="side-foot">
      Generated {{GENERATED_AT}}<br>
      <span id="stat"></span>
    </div>
  </aside>

  <main class="main">
    <header class="doc-head">
      <h1>{{TITLE}}</h1>
      <div class="sub">{{SUBTITLE}}</div>
      <div class="chips">{{CHIPS}}</div>
    </header>

    <div id="content">
<!-- CONTENT -->
    </div>
    <div class="no-results" id="noResults">No sections match your search.</div>
  </main>
</div>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({startOnLoad:true,theme:'dark',securityLevel:'loose',themeVariables:{fontFamily:'ui-monospace,monospace',fontSize:'13px'}});
</script>
<script>
(function(){
  const content=document.getElementById('content');
  const toc=document.getElementById('toc');
  const slug=t=>t.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60);
  const used={};
  // Build TOC from h2/h3
  const heads=[...content.querySelectorAll('h2,h3')];
  heads.forEach(h=>{
    if(!h.id){let s=slug(h.textContent)||'sec';if(used[s])s+='-'+(++used[s]);else used[s]=1;h.id=s;}
    const a=document.createElement('a');
    a.href='#'+h.id;a.textContent=h.textContent;
    a.className=h.tagName==='H3'?'lvl3':'';
    a.dataset.target=h.id;
    toc.appendChild(a);
  });
  document.getElementById('stat').textContent=
    content.querySelectorAll('section[data-section]').length+' sections · '+
    content.querySelectorAll('table').length+' tables · '+
    content.querySelectorAll('.mermaid').length+' diagrams';

  // Scrollspy
  const links=[...toc.querySelectorAll('a')];
  const byId=Object.fromEntries(links.map(a=>[a.dataset.target,a]));
  const obs=new IntersectionObserver(es=>{
    es.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.remove('active'));byId[e.target.id]&&byId[e.target.id].classList.add('active');}});
  },{rootMargin:'-10% 0px -80% 0px',threshold:0});
  heads.forEach(h=>obs.observe(h));
  // Close mobile sidebar on nav
  links.forEach(a=>a.addEventListener('click',()=>document.querySelector('.sidebar').classList.remove('open')));

  // Search: filter sections + TOC, auto-open details
  const sections=[...content.querySelectorAll('section[data-section]')];
  const noRes=document.getElementById('noResults');
  const q=document.getElementById('q');
  q.addEventListener('input',()=>{
    const term=q.value.trim().toLowerCase();
    let shown=0;
    sections.forEach(sec=>{
      const hit=!term||sec.textContent.toLowerCase().includes(term);
      sec.classList.toggle('hidden',!hit);
      if(hit)shown++;
      if(term&&hit)sec.querySelectorAll('details').forEach(d=>d.open=true);
    });
    const visibleIds=new Set(sections.filter(s=>!s.classList.contains('hidden')).flatMap(s=>[...s.querySelectorAll('h2,h3')].map(h=>h.id)));
    links.forEach(a=>a.classList.toggle('hidden',term&&!visibleIds.has(a.dataset.target)));
    noRes.style.display=shown?'none':'block';
  });
  q.addEventListener('keydown',e=>{if(e.key==='Escape'){q.value='';q.dispatchEvent(new Event('input'));}});
})();
</script>
</body>
</html>
